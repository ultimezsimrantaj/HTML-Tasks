<!DOCTYPE html>
<html>
<head>
<title>Survey Form</title>

  

</head>

<body>

<h2>Feedback Survey Form</h2>

<form>

<!-- Text Input -->
<label for="name">Name:</label><br>
<input type="text" value="Enter your name"><br><br>

<label>Email:</label><br>
<input type="email" value="Enter your email"><br><br>

<!-- Radio Buttons -->
<label>How did you hear about us?</label><br>
<input type="radio" name="source"> Friends<br>
<input type="radio" name="source"> Social Media<br>
<input type="radio" name="source"> Internet Search<br><br>

<!-- Dropdown -->
<label>Which topic interests you most?</label><br>
<select>
<option>Web Development</option>
<option>Data Science</option>
<option>Artificial Intelligence</option>
<option>Cyber Security</option>
</select><br><br>

<!-- Checkboxes -->
<label>What features do you like? (Select multiple)</label><br>
<input type="checkbox"> Easy Navigation<br>
<input type="checkbox"> Good Design<br>
<input type="checkbox"> Useful Content<br>
<input type="checkbox"> Fast Performance<br><br>

<!-- Rating Scale -->
<label>Rate your experience (1 to 5)</label><br>
<input type="radio" name="rating"> 1
<input type="radio" name="rating"> 2
<input type="radio" name="rating"> 3
<input type="radio" name="rating"> 4
<input type="radio" name="rating"> 5
<br><br>

<!-- Textarea -->
<label>Additional Feedback:</label><br>
<textarea rows="4" cols="40" placeholder="Write your feedback here"></textarea>
<br><br>

<input type="submit" value="Submit">

</form>

</body>
</html>
