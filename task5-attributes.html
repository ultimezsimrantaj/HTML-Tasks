<!DOCTYPE html>
<html>
<head>
<title>HTML Attributes Example</title>
</head>

<body>

<h1 id="main-title">HTML Attributes Example</h1>

<!-- Paragraph with class attribute -->
<p class="intro">This paragraph uses the class attribute.</p>

<!-- Link with href and target -->
<h2>Link Example</h2>
<a href="https://www.google.com" target="_blank">Visit Google</a>

<!-- Image with src, alt, width -->
<h2>Image Example</h2>
<img src="image.png" alt="Ultimez" width="150">

<!-- Input field with placeholder -->
<h2>Input Example</h2>
<input type="text" placeholder="Enter your name">

<!-- Button with title attribute -->
<h2>Button Example</h2>
<button title="Click this button">Click Me</button>

<!-- List with style attribute -->
<h2>List Example</h2>
<ul style="color:blue;">
<li>HTML</li>
<li>CSS</li>
<li>JavaScript</li>
</ul>

</body>
</html>
