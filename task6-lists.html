<!DOCTYPE html>
<html>
<head>
<title>HTML Lists Example</title>
</head>

<body>

<h1>HTML Lists</h1>

<!-- Unordered List -->
<h2>Unordered List</h2>
<p>An unordered list displays items with bullet points.</p>

<ul>
<li>HTML</li>
<li>CSS</li>
<li>JavaScript</li>
<li>Python</li>
</ul>

<!-- Ordered List -->
<h2>Ordered List</h2>
<p>An ordered list displays items in numbered order.</p>

<ol>
<li>Wake up</li>
<li>Have breakfast</li>
<li>Go to college</li>
<li>Study coding</li>
</ol>

</body>
</html>
