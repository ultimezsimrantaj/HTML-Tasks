<!DOCTYPE html>
<html>
<head>
<title>Colspan and Rowspan Table</title>
<style>
table{
    border-collapse: collapse;
    width: 60%;
    margin: auto;
}

th, td{
    border: 1px solid black;
    padding: 10px;
    text-align: center;
}

h2{
    text-align: center;
}
</style>
</head>

<body>

<h2>Student Timetable</h2>

<table>

<tr>
<th>Day</th>
<th colspan="2">Subjects</th>
</tr>

<tr>
<td rowspan="1">Monday</td>
<td>Math</td>
<td>Science</td>
</tr>

<tr>
<td rowspan="1">Tuesday</td>
<td>English</td>
<td>Computer</td>
</tr>

<tr>
<td>Wednesday</td>
<td colspan="2">Project Work</td>
</tr>

<tr>
<td rowspan="1">Thursday</td>
<td>S.S</td>
<td>Kannada</td>
</tr>

<tr>
<td rowspan="1">Friday</td>
<td>Hindi</td>
<td>Maths</td>
</tr>

<tr>
    <td> Satuarday </td>
    <td colspan="2">Project Work</td>
</tr>
</table>

</body>
</html>
